name: buildalo

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Run tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Create Windows bundle
        shell: pwsh
        run: |
          $bundleDir = "windows-app"
          New-Item -ItemType Directory -Path $bundleDir | Out-Null
          Copy-Item app.py       "$bundleDir/"
          Copy-Item converter.py "$bundleDir/"
          Copy-Item avvia.pyw    "$bundleDir/"
          Copy-Item start.bat    "$bundleDir/"
          Copy-Item README.md    "$bundleDir/"

      - name: Create zip artifact
        shell: pwsh
        run: Compress-Archive -Path windows-app -DestinationPath python-mini-app-windows.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-mini-app-windows
          path: python-mini-app-windows.zip