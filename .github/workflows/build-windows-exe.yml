name: Build Windows Portable App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/${{ github.repository }} source

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install build dependency
        working-directory: source
        run: python -m pip install --upgrade pip nuitka ordered-set zstandard

      - name: Run tests
        working-directory: source
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Build portable app folder
        working-directory: source
        run: >
          python -m nuitka app.py
          --standalone
          --enable-plugin=tk-inter
          --windows-console-mode=disable
          --assume-yes-for-downloads
          --output-filename=app.exe

      - name: Create portable zip
        working-directory: source
        shell: pwsh
        run: Compress-Archive -Path app.dist -DestinationPath python-mini-app-windows-portable.zip -Force

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-mini-app-windows-portable
          path: source/python-mini-app-windows-portable.zip