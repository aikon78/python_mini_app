name: Build Windows Portable App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/${{ github.repository }} source

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install build dependency
        working-directory: source
        run: python -m pip install --upgrade pip

      - name: Run tests
        working-directory: source
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Create portable bundle with embeddable Python
        working-directory: source
        shell: pwsh
        run: |
          $embedUrl = "https://www.python.org/ftp/python/3.12.10/python-3.12.10-embed-amd64.zip"
          $embedZip = "python-embed.zip"
          $portableDir = "portable-app"
          $pyHome = $env:pythonLocation

          Invoke-WebRequest -Uri $embedUrl -OutFile $embedZip
          New-Item -ItemType Directory -Path $portableDir | Out-Null
          Expand-Archive -Path $embedZip -DestinationPath $portableDir -Force

          Copy-Item app.py "$portableDir/app.py"
          Copy-Item converter.py "$portableDir/converter.py"
          Copy-Item README.md "$portableDir/README.md"

          # Tkinter needs _tkinter extension and Tcl/Tk runtime folders.
          Copy-Item "$pyHome/DLLs/_tkinter.pyd" "$portableDir/_tkinter.pyd"
          Copy-Item "$pyHome/DLLs/tcl86t.dll" "$portableDir/tcl86t.dll"
          Copy-Item "$pyHome/DLLs/tk86t.dll" "$portableDir/tk86t.dll"
          Copy-Item "$pyHome/tcl" "$portableDir/tcl" -Recurse

          @'
          @echo off
          setlocal
          cd /d %~dp0
          set "TCL_LIBRARY=%~dp0tcl\tcl8.6"
          set "TK_LIBRARY=%~dp0tcl\tk8.6"
          python.exe app.py
          if errorlevel 1 (
            echo.
            echo Errore durante l'avvio GUI. Premi un tasto per chiudere.
            pause >nul
          )
          '@ | Set-Content -Encoding ASCII "$portableDir/start_gui.bat"

          @'
          @echo off
          setlocal
          cd /d %~dp0
          set "TCL_LIBRARY=%~dp0tcl\tcl8.6"
          set "TK_LIBRARY=%~dp0tcl\tk8.6"
          python.exe app.py --help
          echo.
          echo Esempio:
          echo python.exe app.py --input file1.csv file2.txt --output risultato.xlsx
          '@ | Set-Content -Encoding ASCII "$portableDir/start_cli.bat"

      - name: Create portable zip
        working-directory: source
        shell: pwsh
        run: Compress-Archive -Path portable-app -DestinationPath python-mini-app-windows-portable.zip -Force

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-mini-app-windows-portable
          path: source/python-mini-app-windows-portable.zip