name: Build standalone Windows .exe

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-exe:
    name: Build DateConverter.exe (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller==6.13.0

      - name: Build .exe
        run: pyinstaller DateConverter.spec

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: DateConverter-windows
          path: dist/DateConverter.exe
          if-no-files-found: error

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/DateConverter.exe
